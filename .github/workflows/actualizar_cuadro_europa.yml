name: Actualizar cuadro de mando Europa

on:
  schedule:
    # Programación doble para cubrir CET/CEST; la ejecución real depende del check hora Madrid.
    - cron: '30 18 * * 1-5'
    - cron: '30 19 * * 1-5'
  workflow_dispatch:
    inputs:
      force_run:
        description: "Permite forzar la ejecución (siempre corre el extractor)"
        required: false
        default: "true"

env:
  TZ: Europe/Madrid

jobs:
  actualizar:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Clonar repositorio
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Instalar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Instalar dependencias
        run: pip install -r requirements.txt

      - name: Comprobar hora España (ventana ~20:30)
        id: hora
        shell: bash
        run: |
          HM=$(date +%H%M)
          echo "Hora local Madrid: $(date '+%H:%M') (HM=$HM)"

          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "run=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          # Ventana 20:00–21:59 (tolerancia cola GitHub)
          if [ "$HM" -ge 2000 ] && [ "$HM" -le 2159 ]; then
            echo "run=true" >> "$GITHUB_OUTPUT"
          else
            echo "run=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Ejecutar extractor
        if: steps.hora.outputs.run == 'true'
        env:
          TZ: Europe/Madrid
          GMAIL_USER: ${{ secrets.GMAIL_USER }}
          GMAIL_PASSWORD: ${{ secrets.GMAIL_PASSWORD }}
          ASUNTO_FILTRO: ${{ secrets.ASUNTO_FILTRO }}
          REMITENTE: ${{ secrets.REMITENTE }}
          HOJA_EXCEL: ${{ secrets.HOJA_EXCEL }}
          NOMBRE_ADJUNTO: ${{ secrets.NOMBRE_ADJUNTO }}
          DRIVE_SPREADSHEET_ID: ${{ secrets.DRIVE_SPREADSHEET_ID }}
          DRIVE_TAB: ${{ secrets.DRIVE_TAB }}
          GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
        run: python extractor_europa_actions.py

      - name: Commit y push si hay cambios
        if: steps.hora.outputs.run == 'true'
        shell: bash
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add data.json
          if git diff --staged --quiet; then
            echo "No hay cambios en data.json."
            exit 0
          fi

          git commit -m "Europa: datos $(date '+%Y-%m-%d %H:%M') — auto" || true

          # Reintentos por colisiones
          for i in 1 2 3; do
            git fetch origin main
            git rebase origin/main || (git rebase --abort && exit 1)
            git push origin HEAD:main && exit 0 || sleep 10
          done
          exit 1

