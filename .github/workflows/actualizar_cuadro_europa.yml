name: Actualizar cuadro de mando Europa

on:
  # Push solo de este marcador → extracción inmediata.
  push:
    branches:
      - main
    paths:
      - '.github/trigger-extract-run.txt'
  schedule:
    # Doble disparo UTC: ~21:10 hora Madrid en verano (19:10 UTC) y en invierno (20:10 UTC).
    # El correo llega sobre las 21:00; se usan dos cron para cubrir cambio verano/invierno.
    # Lun–Sáb (domingo no se programa).
    - cron: '10 19 * * 1-6'
    - cron: '10 20 * * 1-6'
  workflow_dispatch:
    inputs:
      force_run:
        description: "Permite forzar la ejecución (siempre corre el extractor)"
        required: false
        default: "true"

env:
  TZ: Europe/Madrid

jobs:
  actualizar:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    permissions:
      contents: write
      issues: write

    steps:
      - name: Clonar repositorio
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Instalar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Instalar dependencias
        run: pip install -r requirements.txt

      - name: Guardar estado previo de data.json
        id: pre
        shell: bash
        run: |
          if [ -f data.json ]; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
            echo "hash=$(sha256sum data.json | awk '{print $1}')" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
            echo "hash=missing" >> "$GITHUB_OUTPUT"
          fi

      - name: Ejecutar extractor (con reintentos)
        env:
          TZ: Europe/Madrid
          GMAIL_USER: ${{ secrets.GMAIL_USER }}
          GMAIL_PASSWORD: ${{ secrets.GMAIL_PASSWORD }}
          ASUNTO_FILTRO: ${{ secrets.ASUNTO_FILTRO }}
          REMITENTE: ${{ secrets.REMITENTE }}
          HOJA_EXCEL: ${{ secrets.HOJA_EXCEL }}
          NOMBRE_ADJUNTO: ${{ secrets.NOMBRE_ADJUNTO }}
          DRIVE_SPREADSHEET_ID: ${{ secrets.DRIVE_SPREADSHEET_ID }}
          DRIVE_TAB: ${{ secrets.DRIVE_TAB }}
          GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
        shell: bash
        run: |
          for i in 1 2 3; do
            echo "Intento extractor #$i"
            if python extractor_europa_actions.py; then
              exit 0
            fi
            echo "Extractor falló en intento #$i; reintentando en 120s..."
            sleep 120
          done
          echo "Extractor falló tras 3 intentos."
          exit 1

      - name: Validar data.json generado
        shell: bash
        run: |
          if [ ! -f data.json ]; then
            echo "ERROR: no existe data.json tras ejecutar extractor."
            exit 1
          fi
          python - <<'PY'
          import json, sys
          from pathlib import Path
          p = Path("data.json")
          try:
              data = json.loads(p.read_text(encoding="utf-8"))
          except Exception as e:
              print(f"ERROR: data.json inválido: {e}")
              sys.exit(1)
          for key in ("meta", "kpis", "series", "historical"):
              if key not in data:
                  print(f"ERROR: falta clave obligatoria '{key}' en data.json")
                  sys.exit(1)
          if "lastRunTs" not in data.get("meta", {}):
              print("ERROR: falta meta.lastRunTs en data.json")
              sys.exit(1)
          print("OK: data.json válido")
          PY

      - name: Commit y push si hay cambios
        shell: bash
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add data.json
          if git diff --staged --quiet; then
            echo "No hay cambios en data.json."
            exit 0
          fi

          git commit -m "Europa: datos $(date '+%Y-%m-%d %H:%M') — auto" || true

          # Reintentos por colisiones
          for i in 1 2 3; do
            git fetch origin main
            git rebase origin/main || (git rebase --abort && exit 1)
            git push origin HEAD:main && exit 0 || sleep 10
          done
          exit 1

      - name: Crear incidencia automática si falla
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            const title = `[ALERTA] Fallo actualización Europa - ${new Date().toISOString().slice(0,16).replace('T',' ')}`;
            const body = [
              "La actualización automática del cuadro de mando Europa ha fallado.",
              "",
              `- Workflow: ${context.workflow}`,
              `- Run ID: ${context.runId}`,
              `- Evento: ${context.eventName}`,
              `- Rama: ${context.ref}`,
              "",
              `Revisar logs: https://github.com/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`
            ].join("\n");
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title,
              body,
              labels: ["automacion", "alerta", "dashboard-europa"]
            });

      - name: Notificar por webhook si falla (blindada+)
        if: failure() && env.FAIL_ALERT_WEBHOOK_URL != ''
        env:
          FAIL_ALERT_WEBHOOK_URL: ${{ secrets.FAIL_ALERT_WEBHOOK_URL }}
        shell: bash
        run: |
          PAYLOAD=$(cat <<EOF
          {"text":"ALERTA: fallo en actualización automática del dashboard Europa. Run: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }} | Evento: ${{ github.event_name }} | Rama: ${{ github.ref_name }}"}
          EOF
          )
          curl -sS -X POST "$FAIL_ALERT_WEBHOOK_URL" \
            -H "Content-Type: application/json" \
            -d "$PAYLOAD"
